<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Makeup | Lintons Beauty</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header>

<div class="top-header">

<div class="logo">
LINTONS <span>BEAUTY</span>
</div>

<div class="search-bar">

<input
type="text"
id="search-input"
placeholder="Search makeup...">

<button>

<i class="fa-solid fa-magnifying-glass"></i>

</button>

</div>

<div class="header-actions">

<a href="index.html" class="login-btn">

<i class="fa-solid fa-house"></i>

Home

</a>

</div>

</div>

<nav>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a class="active">Makeup</a></li>

<li><a href="index.html">Skincare</a></li>

<li><a href="index.html">Haircare</a></li>

<li><a href="index.html">Fragrance</a></li>

</ul>

</nav>

</header>

<!-- ================= BREADCRUMB ================= -->

<section class="breadcrumb">

<p>

<a href="index.html"></a>



MAKEUP

</p>

</section>

<!-- ================= BANNER ================= -->

<section class="makeup-banner">

<img
src="https://www.shutterstock.com/image-photo/makeup-artist-applies-powder-blush-260nw-1805797540.jpg"
alt="Makeup Banner">

</section>

<!-- ================= SHOP ================= -->

<section id="products">

<div class="shop-layout">

<!-- Sidebar -->

<aside class="sidebar">

<h2>Filter by PRICE value</h2>





<input
type="range"
id="price-filter"
min="500"
max="15000"
value="15000">

<p>



<span id="price-value">



</span>

</p>

</div>





<label>





</label>

<label>



</label>

<label>





</label>

</div>

</aside>

<!-- Products -->

<div class="products-area">

<div class="sort-bar">

<select id="price-sort">

<option value="default">

Sort by

</option>

<option value="low-high">

Price: Low to High

</option>

<option value="high-low">

Price: High to Low

</option>

</select>

</div>

<div id="products-grid" class="products-grid">

</div>

</div>

</div>

</section>

<!-- ================= PRODUCT MODAL ================= -->

<div id="product-modal" class="modal">

<div class="modal-content">

<span class="close-modal">&times;</span>

<div class="modal-body">

<div class="modal-image">

<img id="modal-img" src="">

</div>

<div class="modal-info">

<h2 id="modal-title"></h2>

<p id="modal-brand"></p>

<p id="modal-price"></p>

<p id="modal-rating"></p>

<p id="modal-desc"></p>

<button class="add-to-cart-btn">

Add to Bag

</button>

</div>

</div>

</div>

</div>

<!-- ================= FOOTER ================= -->

<footer class="footer">

<div class="footer-bottom">

<p>

© 2026 Lintons Beauty.

All Rights Reserved.

</p>

</div>

</footer>

<!-- ================= JAVASCRIPT ================= -->

<script src="script.js"></script>

<script>

currentCategory = "Makeup";

document.addEventListener("DOMContentLoaded", () => {

fetchProducts();

const slider = document.getElementById("price-filter");

const value = document.getElementById("price-value");

slider.addEventListener("input", () => {

value.textContent = slider.value;

});

});

</script>

</body>

</html>
